name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: test
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: |
          go mod download
          go test -race ./...
